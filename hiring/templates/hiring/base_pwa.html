<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ===== PWA META TAGS ===== -->
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tolleya">
    <meta name="application-name" content="Tolleya">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#c62828">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- ===== PWA MANIFEST ===== -->
    <link rel="manifest" href="/static/hiring/manifest.json">
    
    <!-- ===== PWA ICONS ===== -->
    <link rel="apple-touch-icon" href="/static/hiring/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/hiring/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/hiring/icons/icon-512x512.png">
    <link rel="mask-icon" href="/static/hiring/icons/icon-192x192.png" color="#c62828">
    
    <!-- ===== FAVICON ===== -->
    <link rel="shortcut icon" href="/static/hiring/icons/icon-72x72.png">
    
    <!-- ===== TITLE ===== -->
    <title>{% block title %}Tolleya - Find Your Dream Property & Jobs{% endblock %}</title>
    
    <!-- ===== STYLES ===== -->
    {% block styles %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    {% endblock %}
    
    <!-- ===== CUSTOM STYLES ===== -->
    <style>
        /* PWA specific styles */
        .pwa-splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
        }
        
        .pwa-splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .pwa-splash-screen .splash-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .pwa-splash-screen .splash-title {
            margin-top: 20px;
            font-size: 24px;
            font-weight: 700;
            color: #c62828;
        }
        
        .pwa-splash-screen .splash-loading {
            margin-top: 20px;
            width: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .pwa-splash-screen .splash-loading-bar {
            height: 100%;
            background: #c62828;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        /* Safe area support for installed PWA */
        @media (display-mode: standalone) {
            .safe-area-top {
                padding-top: env(safe-area-inset-top);
            }
            
            .safe-area-bottom {
                padding-bottom: env(safe-area-inset-bottom);
            }
            
            /* Hide browser-only elements */
            .browser-only {
                display: none !important;
            }
            
            /* Full screen app */
            body {
                background: #f8f9fa;
                min-height: 100vh;
                min-height: -webkit-fill-available;
            }
        }
        
        /* Touch targets for mobile */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* Prevent pull-to-refresh on mobile */
        .no-pull-refresh {
            overscroll-behavior: none;
        }
        
        /* Smooth scrolling */
        .smooth-scroll {
            scroll-behavior: smooth;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- ===== PWA SPLASH SCREEN ===== -->
    <div class="pwa-splash-screen" id="pwaSplash">
        <img src="/static/hiring/icons/icon-192x192.png" alt="Tolleya" class="splash-logo">
        <div class="splash-title">Tolleya</div>
        <div class="splash-loading">
            <div class="splash-loading-bar"></div>
        </div>
    </div>
    
    <!-- ===== MAIN CONTENT ===== -->
    {% block content %}{% endblock %}
    
    <!-- ===== PWA JAVASCRIPT ===== -->
    <script src="/static/hiring/js/pwa.js"></script>
    
    <!-- ===== HIDE SPLASH SCREEN ===== -->
    <script>
        // Hide splash screen after page loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('pwaSplash');
                if (splash) {
                    splash.classList.add('hidden');
                    setTimeout(function() {
                        splash.style.display = 'none';
                    }, 600);
                }
            }, 800);
        });
        
        // Handle navigation to hide splash quickly
        document.addEventListener('DOMContentLoaded', function() {
            const splash = document.getElementById('pwaSplash');
            if (splash && !splash.classList.contains('hidden')) {
                splash.classList.add('hidden');
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 600);
            }
        });
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
